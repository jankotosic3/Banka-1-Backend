spring.application.name=transferService
server.port=${SERVER_PORT:8085}

# Security (JWT)
jwt.secret=${JWT_SECRET}
banka.security.issuer=banka1
banka.security.id=id
banka.security.roles-claim=roles
banka.security.permissions-claim=permissions
banka.security.expiration-time=3600000
banka.security.permit-all=/v3/api-docs/**, /v3/api-docs.yaml, /swagger-ui/**, /swagger-ui.html, /actuator/**, /hello

# Swagger / OpenAPI - Prilago?eno za Gateway rute
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Gateway integracija
server.forward-headers-strategy=FRAMEWORK

# Observability (OTEL) - Ako si podigao setup/docker-compose, ovo ?e raditi
management.endpoints.web.exposure.include=*
management.endpoint.health.probes.enabled=true
management.tracing.sampling.probability=1.0
management.opentelemetry.tracing.export.otlp.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
management.otlp.metrics.export.url=${MANAGEMENT_OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}

# RabbitMQ Base
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# RabbitMQ Routing Config
rabbitmq.queue=${NOTIFICATION_QUEUE:notification-service-queue}
rabbitmq.exchange=${NOTIFICATION_EXCHANGE:transfer.events}
rabbitmq.routing-key=${NOTIFICATION_ROUTING_KEY:transfer.#}

# Database (Postgres)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:transferdb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Liquibase - Mora? napraviti folder src/main/resources/db/changelog/
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Za skipovanje verifikacije
transfer.verification.skip=${SKIP_VERIFICATION:true}

# todo dodati urlove servisa - npr primer dole
# fixme, proveriti da li je ovo nacin na koji ocekujemo da cemo dobiti urlove, ili ipak dobijamo samo port ili tako nesto
services.client.url=http://${CLIENT_SERVICE_HOST:localhost}:${CLIENT_SERVER_PORT:8083}
services.account.url=http://${ACCOUNT_SERVICE_HOST:localhost}:${ACCOUNT_SERVER_PORT:8084}
services.exchange.url=http://${EXCHANGE_SERVICE_HOST:localhost}:${EXCHANGE_SERVER_PORT:8082}
services.verification.url=http://${VERIFICATION_SERVICE_HOST:localhost}:${VERIFICATION_SERVER_PORT:8080}