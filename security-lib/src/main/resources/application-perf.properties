# PR_08 C8.1: shared HikariCP / JPA performance defaults.
#
# Auto-load-uje se u svaki servis koji ukljuci security-lib (Spring Boot
# spring.config.import=classpath:application-perf.properties).
#
# Defaults su konzervativni za banking domen — prefer reliability nad raw throughput.

# --- HikariCP pool ---------------------------------------------------------
# Default 10 konekcija po pool-u (Spring Boot default), banking-core moze da
# overrride na 20 zbog povecanog QPS-a.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# --- JPA -------------------------------------------------------------------
# Open-in-view: kriticno NE drzati session otvorenom kroz web tier (lazy fetch
# u kontroleru je bug, ne feature). Vec postavljeno u user-service i
# banking-core; PR_08 dodaje i ostalim servisima.
spring.jpa.open-in-view=false

# Hibernate batching za bulk insert/update operacija
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true

# Statistics — uklanjaju se u prod
spring.jpa.properties.hibernate.generate_statistics=false

# --- Tomcat threads --------------------------------------------------------
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100
server.tomcat.connection-timeout=20s
