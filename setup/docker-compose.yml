    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${TRADING_SERVICE_PORT:-8088}/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
