    volumes:
      - credit-service-logs:/var/log/banka
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${CREDIT_SERVER_PORT:-8089}/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy: *app-resource-limits

  # 7/7. Saga Orchestrator Service (samostalan, #213, #214, #215)
  saga-orchestrator-service:
    build:
      context: ..
      dockerfile: saga-orchestrator-service/Dockerfile
      args:
        SERVER_PORT: ${SAGA_SERVER_PORT:-8095}
    container_name: saga-orchestrator-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SAGA_SERVICE_HOST: 0.0.0.0
      SAGA_SERVICE_PORT: ${SAGA_SERVER_PORT:-8095}
      SERVER_PORT: ${SAGA_SERVER_PORT:-8095}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${SAGA_POSTGRES_DB:-saga_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://otel-collector:4318/v1/metrics
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: saga-orchestrator-service
      <<: *jvm-tuning
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      otel-collector: { condition: service_started }
    expose:
      - "${SAGA_SERVER_PORT:-8095}"
    networks:
      - banka-network
    volumes:
      - saga-orchestrator-service-logs:/var/log/banka
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${SAGA_SERVER_PORT:-8095}/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy: *app-resource-limits

  # 8/8. Interbank Service (samostalan, inter-bank routing; PR_32)
  interbank-service:
    build:
      context: ..
      dockerfile: interbank-service/Dockerfile
      args:
        SERVER_PORT: ${INTERBANK_SERVER_PORT:-8091}
    container_name: banka_interbank_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: ${INTERBANK_SERVER_PORT:-8091}
      INTERBANK_DB_HOST: postgres
      INTERBANK_DB_PORT: 5432
      INTERBANK_DB_NAME: ${INTERBANK_DB_NAME:-interbank_service}
      INTERBANK_DB_USER: ${INTERBANK_DB_USER:-postgres}
      INTERBANK_DB_PASSWORD: ${INTERBANK_DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      LIQUIBASE_CONTEXTS: ${LIQUIBASE_CONTEXTS:-dev}
      BANKA1_ROUTING_NUMBER: ${BANKA1_ROUTING_NUMBER:-111}
      BANKA1_DISPLAY_NAME: ${BANKA1_DISPLAY_NAME:-Banka 1}
      BANKA2_ROUTING_NUMBER: ${BANKA2_ROUTING_NUMBER:-222}
      BANKA2_DISPLAY_NAME: ${BANKA2_DISPLAY_NAME:-Banka 2}
      BANKA2_BASE_URL: ${BANKA2_BASE_URL:-http://interbank-service:8091/_mock/banka2/}
      BANKA2_INBOUND_TOKEN: ${BANKA2_INBOUND_TOKEN:-dev-inbound-banka2-to-banka1}
      BANKA2_OUTBOUND_TOKEN: ${BANKA2_OUTBOUND_TOKEN:-dev-outbound-banka1-to-banka2}
      SERVICES_USER_URL: http://user-service:${USER_SERVICE_PORT:-8081}
      SERVICES_BANKING_CORE_URL: http://banking-core-service:${BANKING_CORE_SERVICE_PORT:-8084}
      SERVICES_TRADING_URL: http://trading-service:${TRADING_SERVICE_PORT:-8088}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev,mock-partner}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://otel-collector:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: interbank-service
      LOGGING_FILE_PATH: /var/log/banka
      <<: *jvm-tuning
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      banking-core-service: { condition: service_healthy }
      trading-service: { condition: service_healthy }
      user-service: { condition: service_healthy }
      otel-collector: { condition: service_started }
    expose:
      - "${INTERBANK_SERVER_PORT:-8091}"
    networks:
      - banka-network
    volumes:
      - interbank-service-logs:/var/log/banka
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${INTERBANK_SERVER_PORT:-8091}/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy: *app-resource-limits

  # =========================================================================
  # API Gateway (Nginx) — depends on svih 8 servisa
  # =========================================================================
  api-gateway:
    build:
      context: ..
      dockerfile: api-gateway/Dockerfile
    container_name: banka_api_gateway
    restart: unless-stopped
    ports:
      - "${API_GATEWAY_PORT:-80}:80"
    env_file:
      - .env
    environment:
      USER_SERVICE_PORT: ${USER_SERVICE_PORT:-8081}
      BANKING_CORE_SERVICE_PORT: ${BANKING_CORE_SERVICE_PORT:-8084}
      MARKET_SERVICE_PORT: ${MARKET_SERVICE_PORT:-8085}
      TRADING_SERVICE_PORT: ${TRADING_SERVICE_PORT:-8088}
      CREDIT_SERVER_PORT: ${CREDIT_SERVER_PORT:-8089}
      NOTIFICATION_SERVICE_PORT: ${NOTIFICATION_SERVER_PORT:-8006}
      SAGA_SERVICE_PORT: ${SAGA_SERVER_PORT:-8095}
      INTERBANK_SERVICE_PORT: ${INTERBANK_SERVER_PORT:-8091}
    depends_on:
      user-service: { condition: service_healthy }
      banking-core-service: { condition: service_healthy }
      market-service: { condition: service_healthy }
      trading-service: { condition: service_healthy }
      credit-service: { condition: service_healthy }
      notification-service: { condition: service_healthy }
      saga-orchestrator-service: { condition: service_healthy }
      interbank-service: { condition: service_healthy }
    networks:
      - banka-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/gateway-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    # PR_19 C19.1: Nginx je tankak — 64M za worker process-e + buffer-e je preobilato.
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

  # =========================================================================
  # Frontend (Angular SPA served kroz Nginx) — PR_19 C19.X
  # =========================================================================
  frontend:
    build:
      context: ../../Banka-1-Frontend-main
      dockerfile: Dockerfile
    container_name: banka_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    networks:
      - banka-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

networks:
  banka-network:
    driver: bridge

volumes:
  postgres-data:
  grafana-data:
  loki-data:
  notification-service-logs:
  user-service-logs:
  banking-core-service-logs:
  market-service-logs:
  trading-service-logs:
  credit-service-logs:
  saga-orchestrator-service-logs:
  interbank-service-logs:
