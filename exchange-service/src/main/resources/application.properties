spring.application.name=exchange-service
server.address=${EXCHANGE_SERVICE_HOST:0.0.0.0}
server.port=${EXCHANGE_SERVER_PORT:8085}

jwt.secret=${JWT_SECRET}
banka.security.issuer=banka1
banka.security.id=id
banka.security.roles-claim=roles
banka.security.permissions-claim=permissions
banka.security.permit-all=/actuator/**,/v3/api-docs/**,/v3/api-docs.yaml,/swagger-ui/**,/swagger-ui.html

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.config-url=/api/exchange/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/api/exchange/v3/api-docs
server.forward-headers-strategy=FRAMEWORK

spring.datasource.url=jdbc:postgresql://${EXCHANGE_DB_HOST:localhost}:${EXCHANGE_DB_PORT:5432}/${EXCHANGE_DB_NAME:exchange_db}
spring.datasource.username=${EXCHANGE_DB_USER:postgres}
spring.datasource.password=${EXCHANGE_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.group.readiness.include=readinessState,db
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
management.otlp.metrics.export.enabled=true
management.otlp.metrics.export.url=${MANAGEMENT_OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}

company.observability.starter.user-id-mdc-enabled=true
