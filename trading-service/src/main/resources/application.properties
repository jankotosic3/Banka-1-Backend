spring.application.name=tradingService
server.port=${SERVER_PORT:8088}

# --- Security -------------------------------------------------------------
jwt.secret=${JWT_SECRET}
banka.security.issuer=banka1
banka.security.id=id
banka.security.roles-claim=roles
banka.security.permissions-claim=permissions
banka.security.expiration-time=3600000

# Permit-all spaja samo public dashboard endpoint-e:
banka.security.permit-all=/v3/api-docs/**,/v3/api-docs.yaml,/swagger-ui/**,/swagger-ui.html,/actuator/health/liveness,/actuator/health/readiness,/actuator/info,/stocks/internal/**

# --- Swagger / OpenAPI (PR_01 C1.5) ---------------------------------------
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.config-url=/trading/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/trading/v3/api-docs
server.forward-headers-strategy=FRAMEWORK

# --- Actuator (PR_01 C1.2) ------------------------------------------------
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

# --- Observability (OTEL) -------------------------------------------------
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
management.otlp.metrics.export.enabled=true
management.otlp.metrics.export.url=${MANAGEMENT_OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}
company.observability.starter.user-id-mdc-enabled=true

# --- RabbitMQ (saga events + notifications) -------------------------------
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
rabbitmq.queue=${NOTIFICATION_QUEUE}
rabbitmq.exchange=${NOTIFICATION_EXCHANGE}
rabbitmq.routing-key=${NOTIFICATION_ROUTING_KEY}

# --- External service URLs (REST hop-ovi koji ostaju) --------------------
# trading-service ne moze biti deo banking-core-a jer pripada drugom subdomain-u
# (securities trading vs banking operations); cross-modul pozivi ostaju REST.
services.user-service.url=${SERVICES_USER_URL:http://user-service:8081}
services.banking-core.url=${SERVICES_BANKING_CORE_URL:http://banking-core-service:8084}
services.market-service.url=${SERVICES_MARKET_URL:http://market-service:8085}

# --- Legacy order-service service URLs (PR_19 konsolidacija) -----------------
# Order-service legacy kod referencira services.{account,employee,client,exchange,stock}.url.
# Posto su ti servisi konsolidovani, sve cross-domain rute idu kroz nove module:
#   - account/transaction -> banking-core-service (8084)
#   - employee/client      -> user-service (8081)
#   - exchange/stock       -> market-service (8085)
services.account.url=${SERVICES_ACCOUNT_URL:${services.banking-core.url}}
services.employee.url=${SERVICES_EMPLOYEE_URL:${services.user-service.url}}
services.client.url=${SERVICES_CLIENT_URL:${services.user-service.url}}
services.exchange.url=${SERVICES_EXCHANGE_URL:${services.market-service.url}}
services.stock.url=${SERVICES_STOCK_URL:${services.market-service.url}}
services.trading.url=${SERVICES_TRADING_URL:http://trading-service:8088}

# Order matching cron (5-min interval; nesh ce biti pomeren u OrderMatchingService)
order.matching.cron=0 */5 * * * *

# --- Database ------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://${TRADING_DB_HOST:postgres}:${TRADING_DB_PORT:5432}/${TRADING_DB_NAME:trading}
spring.datasource.username=${TRADING_DB_USER}
spring.datasource.password=${TRADING_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.contexts=${LIQUIBASE_CONTEXTS:dev}

# Allow bean override (consolidation: order-service merged in)
spring.main.allow-bean-definition-overriding=true

# PR_32 Phase 12: Jackson - deserialize JSON float fields kao BigDecimal (cuva
# preciznost za interbank transfere; izbegava double rounding artifacts).
spring.jackson.deserialization.use-big-decimal-for-floats=true

# PR_32 Phase 12 KRIT #4: dnevni cron za auto-expire OTC ugovora kojima je
# settlementDate prosao. 00:05 svakog dana lokalnog vremena.
otc.expire.cron=${OTC_EXPIRE_CRON:0 5 0 * * *}

# PR_32 Phase 12: lokalni interbank routing number — koristi se u
# PublicStocksInternalController za markiranje "seller je u nasoj banci".
interbank.my-routing-number=${BANKA1_ROUTING_NUMBER:111}
