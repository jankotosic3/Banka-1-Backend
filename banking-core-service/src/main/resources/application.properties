spring.application.name=bankingCoreService
server.port=${SERVER_PORT:8084}

# PR_19 C19.X: dozvoljava override-ovanje duplikat @Bean definicija. Konsolidacija
# 5 legacy modula u banking-core ima nekoliko duplikata (RestClient.Builder, JWT
# interceptor) — banking-core verzije su novije i imaju sve features (service-JWT
# interceptor); legacy verzije se override-uju.
spring.main.allow-bean-definition-overriding=true

# --- Security -------------------------------------------------------------
jwt.secret=${JWT_SECRET}
banka.security.issuer=banka1
banka.security.id=id
banka.security.roles-claim=roles
banka.security.permissions-claim=permissions
banka.security.expiration-time=3600000

# Permit-all spaja:
#   - swagger + actuator probes
#   - nikoji od /accounts, /cards, /transactions, /transfers, /otp ne ide u permit-all
#     (sve zahteva JWT). Public market data ide kroz market-service, ne ovde.
banka.security.permit-all=/v3/api-docs/**,/v3/api-docs.yaml,/swagger-ui/**,/swagger-ui.html,/actuator/health/liveness,/actuator/health/readiness,/actuator/info

# --- Swagger / OpenAPI (PR_01 C1.5) ---------------------------------------
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.config-url=/banking/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/banking/v3/api-docs
server.forward-headers-strategy=FRAMEWORK

# --- Actuator (PR_01 C1.2) ------------------------------------------------
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.group.readiness.include=readinessState,db,rabbit

# --- Observability (OTEL) -------------------------------------------------
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
management.otlp.metrics.export.enabled=true
management.otlp.metrics.export.url=${MANAGEMENT_OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}
company.observability.starter.user-id-mdc-enabled=true

# --- RabbitMQ (saga events + notifications) -------------------------------
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
rabbitmq.queue=${NOTIFICATION_QUEUE}
rabbitmq.exchange=${NOTIFICATION_EXCHANGE}
rabbitmq.routing-key=${NOTIFICATION_ROUTING_KEY}

# --- External service URLs (jos uvek potrebno za user-service iz C2.3) ----
# Posle C2.16 cleanup-a, user-service zameni stari employee-service (port 8081)
# i client-service (port 8083).
services.user-service.url=${SERVICES_USER_URL:http://user-service:8081}

# Account-service URL (PR_14 C14.4) — banking-core poziva /internal/accounts/* za
# debit/credit operacije nad tekucim racunima (margin add/withdraw + bank-to-exchange).
services.account.url=${SERVICES_ACCOUNT_URL:http://localhost:8084}

# Bank/Exchange "client id" za REST debit/credit poziv (PR_14 C14.4 + PR_15 C15.5).
# Account-service validira ownerId=clientId pre nego sto skida balans. Brojevi racuna
# moraju biti 18-cifreni i prolaziti spec mod-11 invariant ((zbir cifara) % 11 == 0):
#   banka: vlasnik=-1, broj_racuna='111000110000000312' (002-seed-data.sql, PR_30)
#   berza: vlasnik=-3, broj_racuna='111000300000002012' (012-seed-bank-exchange-accounts.sql, PR_30)
banka.banking.bank-client-id=${BANK_CLIENT_ID:-1}
banka.banking.exchange-client-id=${EXCHANGE_CLIENT_ID:-3}
banka.banking.bank-account-number=${BANK_ACCOUNT_NUMBER:111000110000000312}
banka.banking.exchange-account-number=${EXCHANGE_ACCOUNT_NUMBER:111000300000002012}

# --- Card-specific: PAN encryption + verification expiration (cards paket) -
card.creation.automatic-default-limit=${CARD_CREATION_AUTOMATIC_DEFAULT_LIMIT:1000000}
# PR_19: card-service legacy code uses dot notation (card.creation.automatic.default-limit)
card.creation.automatic.default-limit=${CARD_CREATION_AUTOMATIC_DEFAULT_LIMIT:1000000}
card.request.verification-expiration-minutes=${CARD_REQUEST_VERIFICATION_EXPIRATION_MINUTES:15}

# --- PR_19 C19.X: legacy module property aliases ----------------------------
# 5 legacy modula u banking-core-u referenciraju property-je sa starim imenima
# (services.user.url, services.card.url, services.client.url, etc). Banking-core
# zadrzava i nova imena (services.user-service.url) za svoj kod, ali aliase ovde.
my.random.seed=${MY_RANDOM_SEED:1}
services.user.url=${SERVICES_USER_URL:http://user-service:8081}
services.client.url=${SERVICES_USER_URL:http://user-service:8081}
services.card.url=${SERVICES_CARD_URL:http://localhost:8084}
services.verification.url=${SERVICES_VERIFICATION_URL:http://localhost:8084}
services.exchange.url=${SERVICES_EXCHANGE_URL:http://market-service:8085}
# PR_021: legacy AccountService u transaction-service-u takodje koristi services.user.url
# za client lookup (bivsi user-service stub). Sada user-service ima employee+client.
services.transfer.url=${SERVICES_TRANSFER_URL:http://localhost:8084}
# Spec Celina 2: verifikacija OTP-om je obavezna za svako placanje/transfer/limit-change.
# Default je sad SECURE (false) — bypass se eksplicitno trazi kroz SKIP_VERIFICATION=true env.
account.verification.skip=${SKIP_VERIFICATION:false}
transaction.verification.skip=${SKIP_VERIFICATION:false}
transfer.verification.skip=${SKIP_VERIFICATION:false}
# Card-service RabbitClient koristi 'notification.rabbit.exchange' (drugaciji property name)
notification.rabbit.exchange=${NOTIFICATION_EXCHANGE}
# Card-service CardCreationEventListener koristi card.rabbit.auto.queue (auto-creation queue)
card.rabbit.auto.queue=${CARD_RABBIT_AUTO_QUEUE:card.creation.auto.queue}
# PR_31 hotfix: bez ovoga listener binds na default 'card.events' exchange, ali
# account-service publish-uje na NOTIFICATION_EXCHANGE (=employee.events). Mismatch
# je znacio da card.create.# event NIKAD ne dolazi do listener-a, pa kartice ne
# nastaju iako frontend salje createCard=true.
card.rabbit.auto.exchange=${CARD_RABBIT_AUTO_EXCHANGE:${NOTIFICATION_EXCHANGE}}
# Verification-service VerificationService dodaje routing-key.verification kanal
rabbitmq.routing-key.verification=${VERIFICATION_ROUTING_KEY:verification.#}

# --- Verification paket --------------------------------------------------
verification.otp.ttl-minutes=5
verification.otp.max-attempts=3

# --- Database ------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://${BANKING_CORE_DB_HOST:postgres}:${BANKING_CORE_DB_PORT:5432}/${BANKING_CORE_DB_NAME:banking_core}
spring.datasource.username=${BANKING_CORE_DB_USER}
spring.datasource.password=${BANKING_CORE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
# PR_021: legacy account-service kod koristi lazy-loaded Currency proxy u
# InternalAccountDetailsDto.from() — bez open-in-view dolazi do
# LazyInitializationException pri serijalizaciji response-a.
spring.jpa.open-in-view=true

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.contexts=${LIQUIBASE_CONTEXTS:dev}

# --- Jackson (PR_32 Tim 2 §12.1) -----------------------------------------
# Interbank protokol drzi novcane iznose kao JSON brojeve (npr. 123.45);
# Jackson default-no parsira u Double sto otvara floating-point round error
# pri serijalizaciji nazad. Enforce-uje BigDecimal direktno na deserijalizaciji.
spring.jackson.deserialization.use-big-decimal-for-floats=true
